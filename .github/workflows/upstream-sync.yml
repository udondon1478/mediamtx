name: Sync with upstream

on:
  schedule:
    - cron: "0 18 * * 0"   # Sunday 18:00 UTC = Monday 03:00 JST
  workflow_dispatch:

permissions:
  issues: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout fork
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.SYNC_PAT }}

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Merge upstream/main
        id: merge
        run: |
          set -e
          git remote add upstream https://github.com/bluenviron/mediamtx.git
          git fetch upstream main
          if git merge-base --is-ancestor upstream/main HEAD; then
            echo "result=up-to-date" >> "$GITHUB_OUTPUT"
            echo "Already up-to-date with upstream/main." >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi
          UPSTREAM_SHA=$(git rev-parse --short upstream/main)
          if git merge --no-edit upstream/main; then
            echo "result=merged" >> "$GITHUB_OUTPUT"
            {
              echo "### Merged upstream/main (\`${UPSTREAM_SHA}\`)"
              echo ""
              echo "Changes since previous fork HEAD:"
              echo ""
              echo '```'
              git log --oneline HEAD@{1}..HEAD | head -50
              echo '```'
            } >> "$GITHUB_STEP_SUMMARY"
          else
            echo "result=conflict" >> "$GITHUB_OUTPUT"
            {
              echo "### Merge conflict with upstream/main (\`${UPSTREAM_SHA}\`)"
              echo ""
              echo "Auto-sync aborted. Resolve locally:"
              echo ""
              echo '```sh'
              echo "git fetch upstream main"
              echo "git merge upstream/main"
              echo "# Re-apply IdleTimeout: 120 * time.Second in internal/servers/rtsp/server.go if needed"
              echo "git push origin main"
              echo '```'
              echo ""
              echo "Conflicting files:"
              echo '```'
              git diff --name-only --diff-filter=U
              echo '```'
            } >> "$GITHUB_STEP_SUMMARY"
            git merge --abort
            exit 1
          fi

      - name: Push
        if: steps.merge.outputs.result == 'merged'
        run: git push origin main

      - name: Open issue on failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const title = 'Upstream sync failed';
            const body = [
              `Auto-sync from \`bluenviron/mediamtx\` failed. See the workflow run for the Step Summary with details:`,
              '',
              runUrl,
              '',
              '**Common causes:**',
              '- Merge conflict on the `IdleTimeout` patch in `internal/servers/rtsp/server.go`',
              '- `git push` rejected due to insufficient `GITHUB_TOKEN` permissions (Settings → Actions → General → Workflow permissions → "Read and write")',
              '',
              '**Local resolution for merge conflicts:**',
              '```sh',
              'git fetch upstream main',
              'git merge upstream/main',
              '# Re-apply IdleTimeout: 120 * time.Second if the merge removed it',
              'git push origin main',
              '```',
            ].join('\n');
            const existing = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'upstream-sync',
            });
            if (existing.data.find(i => i.title === title)) return;
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title,
              body,
              labels: ['upstream-sync'],
            });

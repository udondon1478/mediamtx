name: Sync with upstream

on:
  schedule:
    - cron: "0 18 * * 0"   # Sunday 18:00 UTC = Monday 03:00 JST
  workflow_dispatch:

permissions:
  contents: write
  issues: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout fork
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Merge upstream/main
        id: merge
        run: |
          set -e
          git remote add upstream https://github.com/bluenviron/mediamtx.git
          git fetch upstream main
          if git merge-base --is-ancestor upstream/main HEAD; then
            echo "result=up-to-date" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          if git merge --no-edit upstream/main; then
            echo "result=merged" >> "$GITHUB_OUTPUT"
          else
            echo "result=conflict" >> "$GITHUB_OUTPUT"
            git merge --abort
            exit 1
          fi

      - name: Push
        if: steps.merge.outputs.result == 'merged'
        run: git push origin main

      - name: Open issue on conflict
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const title = 'Upstream sync: merge conflict detected';
            const body = [
              'Auto-sync from `bluenviron/mediamtx` failed — likely a conflict on the `IdleTimeout` patch in `internal/servers/rtsp/server.go`.',
              '',
              '**Resolution:**',
              '1. `git fetch upstream main`',
              '2. `git merge upstream/main` locally',
              '3. Re-apply `IdleTimeout: 120 * time.Second` if the merge removed it',
              '4. `git push origin main`',
              '',
              `Workflow run: ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`
            ].join('\n');
            const existing = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'upstream-sync'
            });
            if (existing.data.find(i => i.title === title)) return;
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title,
              body,
              labels: ['upstream-sync']
            });
